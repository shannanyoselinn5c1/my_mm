name: prof-medics-chat

services:
  postgres:
    image: postgres:16.6-bookworm
    restart: always
    user: nobody
    read_only: true
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cpus: 0.75
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 256
    stop_grace_period: 30s
    stop_signal: SIGINT
    networks:
      - db
    volumes:
      - ../.deploy/volumes/postgres/data:/var/lib/postgresql/data:rw
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
      - /var/run/postgresql:size=64m,noexec,nosuid
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=80
      - -c
      - log_min_duration_statement=500
      - -c
      - log_line_prefix=%m [%p] %q%u@%d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mattermost:
    image: mattermost/mattermost-team-edition:10.5.14
    restart: always
    user: nobody
    read_only: true
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cpus: 1.0
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 512
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db
      - web
      - egress
      - mail
    volumes:
      - ../.deploy/volumes/mattermost/config:/mattermost/config:rw
      - ../.deploy/volumes/mattermost/data:/mattermost/data:rw
      - ../.deploy/volumes/mattermost/logs:/mattermost/logs:rw
      - ../.deploy/volumes/mattermost/plugins:/mattermost/plugins:rw
      - ../.deploy/volumes/mattermost/client-plugins:/mattermost/client/plugins:rw
      - ../.deploy/volumes/mattermost/bleve-indexes:/mattermost/bleve-indexes:rw
    tmpfs:
      - /tmp:size=128m,noexec,nosuid
      - /var/tmp:size=8m,noexec,nosuid
      - /mattermost/prepackaged_plugins:size=1m,noexec,nosuid
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "host=postgres port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable connect_timeout=10"
      MM_SQLSETTINGS_MAXIDLECONNS: "10"
      MM_SQLSETTINGS_MAXOPENCONNS: "30"
      MM_SERVICESETTINGS_SITEURL: "https://${MM_DOMAIN}"
      MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
      MM_SERVICESETTINGS_FORWARD80TO443: "false"
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      MM_SERVICESETTINGS_ENABLELINKPREVIEWS: "false"
      MM_FILESETTINGS_DRIVERNAME: local
      MM_FILESETTINGS_DIRECTORY: /mattermost/data/
      MM_FILESETTINGS_MAXFILESIZE: "52428800"
      MM_LOGSETTINGS_ENABLECONSOLE: "true"
      MM_LOGSETTINGS_CONSOLEJSON: "false"
      MM_LOGSETTINGS_CONSOLELEVEL: "INFO"
      MM_LOGSETTINGS_ENABLEDIAGNOSTICS: "false"
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "false"
      MM_TEAMSETTINGS_ENABLEUSERCREATION: "true"
      MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL: "true"
      MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL: "true"
      MM_EMAILSETTINGS_ENABLESIGNINWITHUSERNAME: "true"
      MM_PASSWORDSETTINGS_MINIMUMLENGTH: "12"
      MM_PASSWORDSETTINGS_LOWERCASE: "true"
      MM_PASSWORDSETTINGS_NUMBER: "true"
      MM_PASSWORDSETTINGS_UPPERCASE: "true"
      MM_PASSWORDSETTINGS_SYMBOL: "true"
      MM_PLUGINSETTINGS_ENABLEMARKETPLACE: "false"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "false"
      MM_PLUGINSETTINGS_AUTOMATICPREPACKAGEDPLUGINS: "false"
      MM_EMAILSETTINGS_SENDPUSHNOTIFICATIONS: "true"
      MM_EMAILSETTINGS_PUSHNOTIFICATIONSERVER: "https://push-test.mattermost.com"
      MM_EMAILSETTINGS_PUSHNOTIFICATIONCONTENTS: "id_loaded"
      MM_EMAILSETTINGS_REQUIREEMAILVERIFICATION: "false"
      # --- SMTP / Email notifications ---
      MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS: "true"
      MM_EMAILSETTINGS_SMTPSERVER: "postfix"
      MM_EMAILSETTINGS_SMTPPORT: "587"
      MM_EMAILSETTINGS_ENABLESMTPAUTH: "false"
      MM_EMAILSETTINGS_CONNECTIONSECURITY: ""
      MM_EMAILSETTINGS_FEEDBACKEMAIL: "noreply@prof-medics.ru"
      MM_EMAILSETTINGS_FEEDBACKNAME: "Prof-Medics Chat"
      MM_EMAILSETTINGS_REPLYTOADDRESS: "noreply@prof-medics.ru"
      MM_SERVICESETTINGS_ENABLEEMAILINVITATIONS: "true"
      MM_RATELIMITSETTINGS_ENABLE: "true"
      MM_RATELIMITSETTINGS_PERSEC: "10"
      MM_METRICSETTINGS_ENABLE: "false"
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  caddy:
    image: hub.xtra.vg/prof-medics-chat/mattermost-caddy:2.8.4
    restart: always
    user: nobody
    read_only: true
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cpus: 0.25
    mem_limit: 128m
    memswap_limit: 128m
    pids_limit: 128
    stop_grace_period: 30s
    stop_signal: SIGTERM
    depends_on:
      mattermost:
        condition: service_healthy
    networks:
      - web
      - egress
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"
    volumes:
      - ../.deploy/volumes/caddy/data:/data:rw
      - ../.deploy/volumes/caddy/config:/config:rw
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    environment:
      MM_DOMAIN: ${MM_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      XDG_DATA_HOME: /data
      XDG_CONFIG_HOME: /config
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 && nc -z 127.0.0.1 80"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  postfix:
    image: boky/postfix:v5.1.0
    restart: always
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - KILL
    cpus: 0.25
    mem_limit: 128m
    memswap_limit: 128m
    pids_limit: 64
    stop_grace_period: 10s
    environment:
      HOSTNAME: mail.prof-medics.ru
      RELAYHOST: ""
      ALLOWED_SENDER_DOMAINS: prof-medics.ru
      DKIM_AUTOGENERATE: "true"
      DKIM_SELECTOR: mail
      TZ: ${TZ}
    volumes:
      - ../.deploy/volumes/postfix/dkim:/etc/opendkim/keys:rw
    networks:
      - mail
      - egress
    healthcheck:
      test: ["CMD", "postfix", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  db:
    internal: true
  web:
    internal: true
  mail:
    internal: true
  egress: {}
